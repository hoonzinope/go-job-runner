server:
  # Use 127.0.0.1 for local-only access.
  # Binding to 0.0.0.0 or a non-loopback address exposes the UI/API to the network.
  host: 0.0.0.0
  port: 8888

store:
  sqlite_path: ./data/app.db
  log_root: ./data/logs
  log_path_pattern: job-%d/run-%d/run.log
  artifact_root: ./data/artifacts
  result_path_pattern: job-%d/run-%d/result.json

scheduler:
  due_job_scan_interval_sec: 2
  dispatch_scan_interval_sec: 1
  max_concurrent_runs: 2
  default_timeout_sec: 3600
  max_timeout_sec: 86400
  allow_unlimited_timeout: false

image:
  allowed_sources:
    - local
    - remote
  default_source: local
  pull_policy: if_not_present
  allowed_prefixes:
    - example-image/
    - jobs/
  remote:
    endpoint: http://192.168.215.1:5001
    insecure: true

executor:
  network_mode: bridge
  read_only_rootfs: false
  memory_limit_mb: 0
  cpu_limit: 0
